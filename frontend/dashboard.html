<!DOCTYPE html>
<html>
<head>

<title>Threat Intelligence Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="terminal">

<h1>GLOBAL THREAT MONITOR</h1>

<canvas id="threatChart"></canvas>

</div>

<script>

const ctx = document.getElementById('threatChart');

new Chart(ctx, {

type: 'bar',

data: {
labels: ["Phishing", "Malware", "Suspicious", "Safe"],

datasets: [{

label: "Threat Detection",

data: [12, 19, 7, 25],

borderWidth: 1

}]

},

options: {

scales: {
y: {
beginAtZero: true
}
}

}

});

</script>

</body>
</html>
