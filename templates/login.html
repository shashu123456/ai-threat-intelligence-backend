<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Threat SOC - Login</title>

<link rel="stylesheet" href="/static/css/auth.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>
<body>

<div class="bg"></div>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h1>AI Threat Intelligence</h1>
        <p>Real-time phishing detection and cybersecurity monitoring platform powered by AI.</p>

        <div class="features">
            <div>✔ AI URL Scanning</div>
            <div>✔ Threat Intelligence</div>
            <div>✔ Global Attack Map</div>
            <div>✔ SOC Dashboard</div>
        </div>
    </div>

    <!-- RIGHT -->
    <form method="POST" class="card">

        <h2>Login</h2>

        <div class="field">
            <input id="email" name="email" required autofocus>
            <label>Email</label>
            <span id="emailError" class="error"></span>
        </div>

        <div class="field">
            <input id="password" name="password" type="password" required>
            <label>Password</label>

            <div class="strength">
                <div id="bar"></div>
            </div>
            <small id="strengthText"></small>
        </div>

        <button type="submit">Login</button>

        <p>Don’t have account? <a href="/auth/register">Register</a></p>

    </form>

</div>

<script src="/static/js/auth.js"></script>

</body>
</html>
